name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: bash tests/run.sh

      - name: ShellCheck
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/*.sh tests/*.sh
          else
            echo "shellcheck not installed; skipping"
          fi
